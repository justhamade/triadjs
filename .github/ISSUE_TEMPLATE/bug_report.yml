name: Bug report
description: Something in Triad doesn't work as expected
title: "[Bug]: "
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Before submitting, please search existing issues to avoid duplicates. For questions or design discussions, please use [Discussions](https://github.com/justhamade/triad/discussions) instead.
  - type: dropdown
    id: package
    attributes:
      label: Package
      description: Which Triad package is affected?
      options:
        - "@triad/core"
        - "@triad/openapi"
        - "@triad/asyncapi"
        - "@triad/gherkin"
        - "@triad/test-runner"
        - "@triad/fastify"
        - "@triad/express"
        - "@triad/hono"
        - "@triad/drizzle"
        - "@triad/cli"
        - "examples/petstore"
        - "examples/tasktracker"
        - "docs"
        - "other"
    validations:
      required: true
  - type: input
    id: triad-version
    attributes:
      label: Triad version(s)
      description: Which version(s) of Triad are you running? Check your `package.json`.
      placeholder: "0.1.0"
    validations:
      required: true
  - type: input
    id: node-version
    attributes:
      label: Node version
      description: Output of `node --version`.
      placeholder: "20.11.0"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows
        - other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear, one-paragraph description of the problem.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: A small code block that reproduces the issue, or a link to a repo/gist. The smaller the better.
      placeholder: |
        ```typescript
        import { t, endpoint } from '@triad/core';

        const Pet = t.model('Pet', {
          id: t.string().format('uuid').identity(),
          name: t.string().minLength(1),
        });

        // ...what you did that broke
        ```
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Include error messages and stack traces if available.
    validations:
      required: true
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Anything else that might help us diagnose the issue (screenshots, related issues, configuration, etc.).
    validations:
      required: false
  - type: checkboxes
    id: duplicate-check
    attributes:
      label: Duplicate check
      options:
        - label: I have searched existing issues and this is not a duplicate
          required: true
  - type: checkboxes
    id: agent-guide
    attributes:
      label: AI Agent Guide
      options:
        - label: I have read the [AI Agent Guide](docs/ai-agent-guide.md) and verified my usage is idiomatic
          required: false
